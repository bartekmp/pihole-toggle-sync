name: Build and publish image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          MSG=$(git log -1 --format=%s)
          BUMP=""

          if echo "$MSG" | grep -q '\[skip\]'; then
            echo "Skipping version bump"
          elif echo "$MSG" | grep -qE '^feature:'; then
            BUMP=minor
          elif echo "$MSG" | grep -qE '^fix:'; then
            BUMP=patch
          else
            echo "No version prefix found, skipping"
          fi

          NEW_TAG=""
          if [ -n "$BUMP" ]; then
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            [ -z "$LATEST" ] && LATEST="v0.0.0"

            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)

            if [ "$BUMP" = "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
            echo "Tagging $NEW_TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  build-and-push:
    needs: [version]
    if: |
      always() && !failure() && !cancelled() && (
        (needs.version.result == 'success' && needs.version.outputs.new_tag != '') ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'pull_request'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image version
        id: ver
        run: |
          TAG="${{ needs.version.outputs.new_tag }}"
          [ -z "$TAG" ] && TAG="${{ github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.ver.outputs.tag }}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ needs.version.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [version, build-and-push]
    if: |
      always() && !failure() && !cancelled() &&
      github.event_name != 'pull_request' &&
      (needs.version.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ needs.version.outputs.new_tag }}"
          [ -z "$TAG" ] && TAG="${{ github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          make_latest: true
