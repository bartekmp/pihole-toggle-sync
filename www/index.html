<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pi-hole toggle sync</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --md-primary: #6750A4;
      --md-on-primary: #fff;
      --md-primary-container: #EADDFF;
      --md-on-primary-container: #21005D;
      --md-surface: #FFFBFE;
      --md-surface-variant: #E7E0EC;
      --md-on-surface: #1C1B1F;
      --md-on-surface-variant: #49454F;
      --md-outline: #79747E;
      --md-outline-variant: #CAC4D0;
      --md-error: #B3261E;
      --md-error-container: #F9DEDC;
      --md-on-error-container: #410E0B;
      --md-success: #386A20;
      --md-success-container: #C3EFAD;
      --md-on-success-container: #072100;
      --md-warning: #7D5700;
      --md-warning-container: #FFDEA1;
      --md-on-warning-container: #261900;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --md-primary: #D0BCFF;
        --md-on-primary: #381E72;
        --md-primary-container: #4F378B;
        --md-on-primary-container: #EADDFF;
        --md-surface: #1C1B1F;
        --md-surface-variant: #49454F;
        --md-on-surface: #E6E1E5;
        --md-on-surface-variant: #CAC4D0;
        --md-outline: #938F99;
        --md-outline-variant: #49454F;
        --md-error: #F2B8B5;
        --md-error-container: #8C1D18;
        --md-on-error-container: #F9DEDC;
        --md-success: #9DD67C;
        --md-success-container: #1D5206;
        --md-on-success-container: #C3EFAD;
        --md-warning: #FFB951;
        --md-warning-container: #5C4100;
        --md-on-warning-container: #FFDEA1;
      }
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--md-surface);
      color: var(--md-on-surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--md-surface);
      border-bottom: 1px solid var(--md-outline-variant);
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--md-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon img {
      width: 24px;
      height: 24px;
    }

    .header-text h1 {
      font-size: 20px;
      font-weight: 500;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 12px;
      color: var(--md-on-surface-variant);
    }

    main {
      flex: 1;
      padding: 1.5rem;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--md-on-surface-variant);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── Instance cards ── */
    .instance-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .instance-card {
      border-radius: 16px;
      border: 1px solid var(--md-outline-variant);
      background: var(--md-surface);
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }

    .instance-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .instance-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--md-outline);
    }

    .instance-dot.online {
      background: var(--md-success);
    }

    .instance-dot.offline {
      background: var(--md-error);
    }

    .instance-host {
      font-size: 13px;
      font-weight: 500;
      color: var(--md-on-surface);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .instance-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .stat {
      background: var(--md-surface-variant);
      border-radius: 10px;
      padding: 7px 10px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--md-on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--md-on-surface);
    }

    .stat-value.blocked {
      color: var(--md-error);
    }

    .stat-value.percent {
      color: var(--md-primary);
    }

    .instance-blocking-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 6px;
      align-self: flex-start;
    }

    .instance-blocking-badge.on {
      background: var(--md-success-container);
      color: var(--md-on-success-container);
    }

    .instance-blocking-badge.off {
      background: var(--md-error-container);
      color: var(--md-on-error-container);
    }

    .instance-blocking-badge .btn-icon {
      font-family: 'Material Symbols Rounded';
      font-size: 13px;
    }

    .instance-error {
      font-size: 12px;
      color: var(--md-error);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .instance-error span {
      font-family: 'Material Symbols Rounded';
      font-size: 14px;
    }

    .instance-skeleton .stat-value {
      background: var(--md-surface-variant);
      color: transparent;
      border-radius: 4px;
      animation: shimmer 1.4s ease infinite;
    }

    @keyframes shimmer {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ── Status card ── */
    .status-card {
      border-radius: 16px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: background 0.3s ease;
    }

    .status-card.enabled {
      background: var(--md-success-container);
    }

    .status-card.disabled {
      background: var(--md-error-container);
    }

    .status-card.loading {
      background: var(--md-warning-container);
    }

    .status-icon {
      font-family: 'Material Symbols Rounded';
      font-size: 28px;
      flex-shrink: 0;
      margin-top: 1px;
      transition: color 0.3s;
    }

    .status-card.enabled .status-icon {
      color: var(--md-success);
    }

    .status-card.disabled .status-icon {
      color: var(--md-error);
    }

    .status-card.loading .status-icon {
      color: var(--md-warning);
    }

    .status-body {
      flex: 1;
    }

    .status-title {
      font-size: 15px;
      font-weight: 500;
      transition: color 0.3s;
    }

    .status-card.enabled .status-title {
      color: var(--md-on-success-container);
    }

    .status-card.disabled .status-title {
      color: var(--md-on-error-container);
    }

    .status-card.loading .status-title {
      color: var(--md-on-warning-container);
    }

    .status-sub {
      font-size: 12px;
      margin-top: 2px;
      transition: color 0.3s;
    }

    .status-card.enabled .status-sub {
      color: var(--md-success);
    }

    .status-card.disabled .status-sub {
      color: var(--md-error);
    }

    .status-card.loading .status-sub {
      color: var(--md-warning);
    }

    .host-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px 3px 6px;
      border-radius: 8px;
      border: 1px solid;
    }

    .chip.ok {
      border-color: var(--md-success);
      color: var(--md-on-success-container);
      background: rgba(56, 106, 32, 0.12);
    }

    .chip.err {
      border-color: var(--md-error);
      color: var(--md-on-error-container);
      background: rgba(179, 38, 30, 0.12);
    }

    .chip .chip-icon {
      font-family: 'Material Symbols Rounded';
      font-size: 13px;
    }

    /* ── Buttons ── */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .md-btn {
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 12px;
      border: 1px solid var(--md-outline-variant);
      background: var(--md-surface);
      color: var(--md-primary);
      padding: 13px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1), 0 1px 3px 1px rgba(0, 0, 0, 0.07);
    }

    .md-btn:hover {
      background: color-mix(in srgb, var(--md-primary) 8%, var(--md-surface));
    }

    .md-btn:active {
      transform: scale(0.97);
    }

    .md-btn:disabled {
      opacity: 0.38;
      pointer-events: none;
      box-shadow: none;
    }

    .md-btn .btn-icon {
      font-family: 'Material Symbols Rounded';
      font-size: 18px;
    }

    .md-btn.danger {
      color: var(--md-error);
      grid-column: 1 / -1;
    }

    .md-btn.danger:hover {
      background: color-mix(in srgb, var(--md-error) 8%, var(--md-surface));
    }

    .md-btn.filled {
      background: var(--md-primary);
      color: var(--md-on-primary);
      border-color: var(--md-primary);
      grid-column: 1 / -1;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18), 0 2px 6px 2px rgba(0, 0, 0, 0.1);
    }

    .md-btn.filled:hover {
      background: color-mix(in srgb, var(--md-on-primary) 8%, var(--md-primary));
    }

    .md-btn.filled .btn-icon {
      color: var(--md-on-primary);
    }


    .custom-row {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .custom-row.visible {
      display: flex;
    }

    .custom-row input[type=number] {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid var(--md-outline);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Roboto', sans-serif;
      background: var(--md-surface);
      color: var(--md-on-surface);
      outline: none;
    }

    .custom-row input[type=number]:focus {
      border-color: var(--md-primary);
    }

    .custom-row select {
      padding: 10px 8px;
      border: 1px solid var(--md-outline);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Roboto', sans-serif;
      background: var(--md-surface);
      color: var(--md-on-surface);
      outline: none;
      cursor: pointer;
    }

    .custom-row select:focus {
      border-color: var(--md-primary);
    }

    .status-actions {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .status-actions.visible {
      display: flex;
    }

    .timer-row {
      font-size: 12px;
      color: var(--md-error);
    }

    .status-actions .md-btn.filled {
      width: 100%;
      justify-content: center;
    }

    .divider {
      height: 1px;
      background: var(--md-outline-variant);
      margin: 1.25rem 0;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 11px;
      color: var(--md-on-surface-variant);
      border-top: 1px solid var(--md-outline-variant);
    }

    footer a {
      color: var(--md-primary);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinning {
      display: inline-block;
      animation: spin 1.2s linear infinite;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-icon"><img src="/favicon.svg" alt=""></div>
    <div class="header-text">
      <h1>Pi-hole toggle sync</h1>
      <p>Manage ad-blocking across all instances</p>
    </div>
  </header>

  <main>

    <div class="section-label">Instances</div>
    <div class="instance-grid" id="instance-grid"></div>

    <div class="divider"></div>

    <div class="section-label" style="margin-bottom:10px;">Blocking control</div>

    <div class="status-card enabled" id="status-card">
      <span class="status-icon" id="status-icon">verified_user</span>
      <div class="status-body">
        <div class="status-title" id="status-title">Blocking enabled</div>
        <div class="status-sub" id="status-sub">All instances are active</div>
        <div class="host-chips" id="host-chips"></div>
        <div class="status-actions" id="status-actions">
          <div class="timer-row" id="timer-label"></div>
          <button class="md-btn filled" onclick="enableAll()">
            <span class="btn-icon">verified_user</span>Re-enable blocking
          </button>
        </div>
      </div>
    </div>

    <div class="section-label">Disable blocking for</div>
    <div class="btn-grid" id="btn-grid">
      <button class="md-btn" onclick="disableAll(30)">
        <span class="btn-icon">timer</span>30 seconds
      </button>
      <button class="md-btn" onclick="disableAll(300)">
        <span class="btn-icon">timer</span>5 minutes
      </button>
      <button class="md-btn" onclick="disableAll(600)">
        <span class="btn-icon">timer</span>10 minutes
      </button>
      <button class="md-btn" onclick="toggleCustomRow()">
        <span class="btn-icon">tune</span>Custom
      </button>
      <button class="md-btn danger" onclick="disableAll(0)">
        <span class="btn-icon">timer_off</span>Indefinitely
      </button>
    </div>

    <div class="custom-row" id="custom-row">
      <input type="number" id="custom-value" min="1" value="30" style="width:80px">
      <select id="custom-unit">
        <option value="1">seconds</option>
        <option value="60" selected>minutes</option>
      </select>
      <button class="md-btn" onclick="disableCustom()">
        <span class="btn-icon">block</span>Disable
      </button>
    </div>

  </main>

  <footer>
    <a href="https://github.com/bartekmp/pihole-toggle-sync" target="_blank">pihole-toggle-sync</a>
    &mdash; MIT license
  </footer>

  <script>
    const PH_HOSTS = '${PH_HOSTS}';
    const PH_PASSWORD = '${PH_PASSWORD}';

    const instances = PH_HOSTS.split(',').map(h => h.trim()).filter(Boolean);
    if (!instances.length) {
      instances.push('http://192.168.0.20:8053', 'http://192.168.0.15:8053');
    }

    let countdown = null;
    let remaining = 0;

    const sidCache = {};

    async function getSid(host) {
      if (!PH_PASSWORD) return null;
      if (sidCache[host]) return sidCache[host];
      try {
        const r = await fetch(host + '/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: PH_PASSWORD })
        });
        if (!r.ok) return null;
        const data = await r.json();
        const sid = data?.session?.sid;
        if (sid) sidCache[host] = sid;
        return sid || null;
      } catch {
        return null;
      }
    }

    function hostLabel(h) {
      return h.replace(/^https?:\/\//, '').replace(/:\d+$/, '');
    }

    function fmt(n) {
      if (n === undefined || n === null) return '—';
      if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return String(Math.round(n));
    }

    function pct(n) {
      if (n === undefined || n === null) return '—';
      return parseFloat(n).toFixed(1) + '%';
    }

    /* ── Instance info cards ── */
    function renderSkeletons() {
      const grid = document.getElementById('instance-grid');
      grid.innerHTML = '';
      instances.forEach(host => {
        const card = document.createElement('div');
        card.className = 'instance-card instance-skeleton';
        card.id = 'icard-' + btoa(host);
        card.innerHTML = `
        <div class="instance-header">
          <div class="instance-dot"></div>
          <div class="instance-host">${hostLabel(host)}</div>
        </div>
        <div class="instance-stats">
          <div class="stat"><div class="stat-label">Queries today</div><div class="stat-value">···</div></div>
          <div class="stat"><div class="stat-label">Blocked</div><div class="stat-value blocked">···</div></div>
          <div class="stat"><div class="stat-label">Block rate</div><div class="stat-value percent">···</div></div>
          <div class="stat"><div class="stat-label">Blocklist</div><div class="stat-value">···</div></div>
        </div>`;
        grid.appendChild(card);
      });
    }

    async function fetchInstanceInfo(host) {
      const sid = await getSid(host);
      const headers = {};
      if (sid) headers['X-FTL-SID'] = sid;
      try {
        const [statsRes, infoRes] = await Promise.all([
          fetch(host + '/api/stats/summary', { headers }),
          fetch(host + '/api/dns/blocking', { headers }),
        ]);
        if (!statsRes.ok || !infoRes.ok) throw new Error('non-200');
        const stats = await statsRes.json();
        const blocking = await infoRes.json();
        return { ok: true, stats, blocking };
      } catch {
        delete sidCache[host];
        return { ok: false };
      }
    }

    function updateInstanceCard(host, data) {
      const card = document.getElementById('icard-' + btoa(host));
      if (!card) return;
      card.classList.remove('instance-skeleton');

      if (!data.ok) {
        card.innerHTML = `
        <div class="instance-header">
          <div class="instance-dot offline"></div>
          <div class="instance-host">${hostLabel(host)}</div>
        </div>
        <div class="instance-error">
          <span>error</span>Unable to reach instance
        </div>`;
        return;
      }

      const s = data.stats;
      const bl = data.blocking;
      const isBlocking = bl?.blocking === true || bl?.blocking === 'enabled';
      const queries = s?.queries?.total;
      const blocked = s?.queries?.blocked;
      const blockPct = s?.queries?.percent_blocked;
      const domains = s?.gravity?.domains_being_blocked;

      card.innerHTML = `
      <div class="instance-header">
        <div class="instance-dot online"></div>
        <div class="instance-host">${hostLabel(host)}</div>
        <span class="instance-blocking-badge ${isBlocking ? 'on' : 'off'}">
          <span class="btn-icon">${isBlocking ? 'check_circle' : 'cancel'}</span>
          ${isBlocking ? 'Blocking' : 'Disabled'}
        </span>
      </div>
      <div class="instance-stats">
        <div class="stat">
          <div class="stat-label">Queries today</div>
          <div class="stat-value">${fmt(queries)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Blocked</div>
          <div class="stat-value blocked">${fmt(blocked)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Block rate</div>
          <div class="stat-value percent">${pct(blockPct)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Blocklist</div>
          <div class="stat-value">${fmt(domains)}</div>
        </div>
      </div>`;
    }

    async function refreshInstances() {
      renderSkeletons();
      await Promise.all(instances.map(async host => {
        const data = await fetchInstanceInfo(host);
        updateInstanceCard(host, data);
      }));
    }

    /* ── Blocking control ── */
    function setCard(state, title, sub, showReenable) {
      const card = document.getElementById('status-card');
      card.className = 'status-card ' + state;
      const iconEl = document.getElementById('status-icon');
      if (state === 'loading') {
        iconEl.innerHTML = '<span class="spinning">sync</span>';
      } else {
        iconEl.textContent = state === 'enabled' ? 'verified_user' : 'gpp_bad';
      }
      document.getElementById('status-title').textContent = title;
      document.getElementById('status-sub').textContent = sub;
      document.getElementById('status-actions').classList.toggle('visible', showReenable);
      document.getElementById('btn-grid').querySelectorAll('button').forEach(b => b.disabled = showReenable);
      if (showReenable) document.getElementById('custom-row').classList.remove('visible');
    }

    function renderChips(results) {
      const wrap = document.getElementById('host-chips');
      wrap.innerHTML = '';
      results.forEach((r, i) => {
        const c = document.createElement('span');
        c.className = 'chip ' + r;
        c.innerHTML = `<span class="chip-icon">${r === 'ok' ? 'check_circle' : 'error'}</span>${hostLabel(instances[i])}`;
        wrap.appendChild(c);
      });
    }

    async function apiCall(host, enable, timer) {
      const body = enable ? { blocking: true } : { blocking: false, timer: timer || 0 };
      const sid = await getSid(host);
      const headers = { 'Content-Type': 'application/json' };
      if (sid) headers['X-FTL-SID'] = sid;
      try {
        const r = await fetch(host + '/api/dns/blocking', { method: 'POST', headers, body: JSON.stringify(body) });
        return r.ok ? 'ok' : 'err';
      } catch { return 'err'; }
    }

    function formatTime(s) {
      if (s >= 3600) return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
      if (s >= 60) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
      return s + 's';
    }

    function toggleCustomRow() {
      const row = document.getElementById('custom-row');
      row.classList.toggle('visible');
      if (row.classList.contains('visible')) document.getElementById('custom-value').focus();
    }

    function disableCustom() {
      const val = parseInt(document.getElementById('custom-value').value, 10);
      const unit = parseInt(document.getElementById('custom-unit').value, 10);
      if (!val || val < 1) return;
      document.getElementById('custom-row').classList.remove('visible');
      disableAll(val * unit);
    }

    async function disableAll(seconds) {
      clearInterval(countdown);
      setCard('loading', 'Contacting instances\u2026', 'Please wait\u2026', false);
      document.getElementById('host-chips').innerHTML = '';
      document.getElementById('timer-label').textContent = '';

      const results = await Promise.all(instances.map(h => apiCall(h, false, seconds)));
      renderChips(results);

      if (!results.some(r => r === 'ok')) {
        setCard('disabled', 'Failed to reach instances', 'Check connectivity and ACL settings', false);
        return;
      }

      if (seconds === 0) {
        setCard('disabled', 'Blocking disabled', 'Disabled indefinitely', true);
      } else {
        remaining = seconds;
        setCard('disabled', 'Blocking disabled', 'Active bypass in progress', true);
        document.getElementById('timer-label').textContent = 'Re-enables in ' + formatTime(remaining);
        countdown = setInterval(() => {
          remaining--;
          if (remaining <= 0) { clearInterval(countdown); enableAll(); return; }
          document.getElementById('timer-label').textContent = 'Re-enables in ' + formatTime(remaining);
        }, 1000);
      }

      setTimeout(refreshInstances, 800);
    }

    async function enableAll() {
      clearInterval(countdown);
      setCard('loading', 'Re-enabling blocking\u2026', 'Please wait\u2026', false);
      document.getElementById('host-chips').innerHTML = '';
      document.getElementById('timer-label').textContent = '';

      const results = await Promise.all(instances.map(h => apiCall(h, true, 0)));
      renderChips(results);
      setCard('enabled', 'Blocking enabled', 'All instances are active', false);

      setTimeout(refreshInstances, 800);
    }

    refreshInstances();
    setInterval(refreshInstances, 30000);
  </script>
</body>

</html>
